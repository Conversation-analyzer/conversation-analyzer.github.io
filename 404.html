<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — AI Conversation Analyzer</title>
    <meta name="description" content="Page not found. The page you're looking for doesn't exist or has been moved.">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            var path = location.pathname;
            if (path === "/" || path === "/index.html" || path.endsWith(".html")) return;
            var tryUrl = path + ".html";
            fetch(tryUrl, { method: "HEAD" }).then(function (r) {
                if (r.ok) location.replace(tryUrl);
            });
        })();
    </script>
</head>
<body>

    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
    </div>

    <!-- Navigation -->
    <header class="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="nav-brand">
                <span class="nav-brand-dot"></span>
                AI Conversation Analyzer
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="features.html">Features</a>
                <a href="docs.html">Docs</a>
                <a href="community.html">Community</a>
                <a href="roadmap.html">Roadmap</a>
                <a href="contributing.html">Contributing</a>
            </nav>
            <div class="nav-right">
                <a class="btn-github desktop" href="https://github.com/Conversation-analyzer" target="_blank">
                    <i class="fa-brands fa-github"></i> Star on GitHub
                </a>
                <button class="nav-toggle" aria-expanded="false" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- 404 Content -->
    <div class="container page-404">
        <h1>404</h1>
        <p>Looks like this conversation got lost.</p>
        <a class="btn btn-primary btn-lg" href="index.html">
            <i class="fa-solid fa-arrow-left"></i> Return Home
        </a>
    </div>

</body>
</html>
