<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — AI Conversation Analyzer</title>
    <meta name="description" content="Page not found. The page you're looking for doesn't exist or has been moved.">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script>
        (function () {
            var path = location.pathname;
            if (path === "/" || path === "/index.html" || path.endsWith(".html")) return;
            var tryUrl = path + ".html";
            fetch(tryUrl, { method: "HEAD" }).then(function (r) {
                if (r.ok) location.replace(tryUrl);
            });
        })();
    </script>
</head>
<body>

    <div id="site-header"></div>

    <!-- 404 Content -->
    <div class="container page-404">
        <h1>404</h1>
        <p>Looks like this conversation got lost.</p>
        <a class="btn btn-primary btn-lg" href="index">
            <i class="fa-solid fa-arrow-left"></i> Return Home
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/include.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
