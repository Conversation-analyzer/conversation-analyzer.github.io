<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Analyzer</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0d1117;
            color:#f0f6fc;
            font-family:Inter,Segoe UI,Arial,sans-serif;
        }

        .card{
            text-align:center;
            padding:40px 60px;
            border:1px solid #30363d;
            border-radius:18px;
            background:#161b22;
            box-shadow:0 0 30px rgba(0,0,0,.35);
        }

        h1{
            font-size:42px;
            margin-bottom:16px;
        }

        p{
            font-size:18px;
            color:#8b949e;
        }

        .dot{
            display:inline-block;
            animation:blink 1.2s infinite;
        }

        @keyframes blink{
            50%{
                opacity:0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>👋 Welcome</h1>
        <p>
            GitHub Pages is working
            <span class="dot">●</span>
        </p>
    </div>

</body>
</html>
